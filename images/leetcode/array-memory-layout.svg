<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Array memory layout</title>
  <desc id="desc">A contiguous memory layout diagram for an array with indexes and addresses.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="960" height="360" rx="0" fill="#f8fafc" />
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Array: contiguous memory</text>
  <text x="480" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Each index maps to an offset from the base address</text>
  <g transform="translate(120 138)">
    <g font-family="Arial, sans-serif" text-anchor="middle">
      <rect x="0" y="42" width="120" height="76" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
      <rect x="120" y="42" width="120" height="76" fill="#e0f2fe" stroke="#2563eb" stroke-width="2" />
      <rect x="240" y="42" width="120" height="76" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
      <rect x="360" y="42" width="120" height="76" fill="#e0f2fe" stroke="#2563eb" stroke-width="2" />
      <rect x="480" y="42" width="120" height="76" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
      <rect x="600" y="42" width="120" height="76" fill="#e0f2fe" stroke="#2563eb" stroke-width="2" />
      <text x="60" y="88" font-size="24" font-weight="700" fill="#0f172a">A[0]</text>
      <text x="180" y="88" font-size="24" font-weight="700" fill="#0f172a">A[1]</text>
      <text x="300" y="88" font-size="24" font-weight="700" fill="#0f172a">A[2]</text>
      <text x="420" y="88" font-size="24" font-weight="700" fill="#0f172a">A[3]</text>
      <text x="540" y="88" font-size="24" font-weight="700" fill="#0f172a">A[4]</text>
      <text x="660" y="88" font-size="24" font-weight="700" fill="#0f172a">A[5]</text>
      <text x="60" y="22" font-size="14" fill="#64748b">index 0</text>
      <text x="180" y="22" font-size="14" fill="#64748b">index 1</text>
      <text x="300" y="22" font-size="14" fill="#64748b">index 2</text>
      <text x="420" y="22" font-size="14" fill="#64748b">index 3</text>
      <text x="540" y="22" font-size="14" fill="#64748b">index 4</text>
      <text x="660" y="22" font-size="14" fill="#64748b">index 5</text>
      <text x="60" y="148" font-size="14" fill="#64748b">base</text>
      <text x="180" y="148" font-size="14" fill="#64748b">base + 1w</text>
      <text x="300" y="148" font-size="14" fill="#64748b">base + 2w</text>
      <text x="420" y="148" font-size="14" fill="#64748b">base + 3w</text>
      <text x="540" y="148" font-size="14" fill="#64748b">base + 4w</text>
      <text x="660" y="148" font-size="14" fill="#64748b">base + 5w</text>
    </g>
    <line x1="0" y1="184" x2="720" y2="184" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
    <text x="360" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a">continuous address space</text>
  </g>
</svg>
