<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Singly linked list structure</title>
  <desc id="desc">A singly linked list diagram with head, nodes, next pointers, and null.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#059669" />
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" />
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Singly linked list</text>
  <text x="480" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Nodes can live anywhere; next pointers connect them in order</text>
  <g transform="translate(92 144)" font-family="Arial, sans-serif">
    <text x="0" y="50" font-size="20" font-weight="700" fill="#0f172a">head</text>
    <line x1="56" y1="44" x2="128" y2="44" stroke="#059669" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(140 0)">
      <rect x="0" y="0" width="154" height="88" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="2" />
      <line x1="94" y1="0" x2="94" y2="88" stroke="#059669" stroke-width="2" />
      <text x="47" y="36" text-anchor="middle" font-size="15" fill="#64748b">data</text>
      <text x="47" y="62" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">12</text>
      <circle cx="124" cy="44" r="9" fill="#059669" />
      <text x="124" y="72" text-anchor="middle" font-size="13" fill="#64748b">next</text>
    </g>
    <line x1="273" y1="44" x2="348" y2="44" stroke="#059669" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(360 32)">
      <rect x="0" y="0" width="154" height="88" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" />
      <line x1="94" y1="0" x2="94" y2="88" stroke="#0284c7" stroke-width="2" />
      <text x="47" y="36" text-anchor="middle" font-size="15" fill="#64748b">data</text>
      <text x="47" y="62" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">7</text>
      <circle cx="124" cy="44" r="9" fill="#0284c7" />
      <text x="124" y="72" text-anchor="middle" font-size="13" fill="#64748b">next</text>
    </g>
    <line x1="493" y1="76" x2="568" y2="76" stroke="#059669" stroke-width="3" marker-end="url(#arrow)" />
    <g transform="translate(580 0)">
      <rect x="0" y="0" width="154" height="88" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
      <line x1="94" y1="0" x2="94" y2="88" stroke="#d97706" stroke-width="2" />
      <text x="47" y="36" text-anchor="middle" font-size="15" fill="#64748b">data</text>
      <text x="47" y="62" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">23</text>
      <circle cx="124" cy="44" r="9" fill="#d97706" />
      <text x="124" y="72" text-anchor="middle" font-size="13" fill="#64748b">next</text>
    </g>
    <line x1="713" y1="44" x2="788" y2="44" stroke="#059669" stroke-width="3" marker-end="url(#arrow)" />
    <text x="808" y="52" font-size="22" font-weight="700" fill="#334155">null</text>
  </g>
</svg>
